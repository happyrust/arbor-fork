# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are generated from git history for release artifacts.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
Arbor release tags follow `YYYYMMDD.NN`.
"""
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% set visible_commits = commits | filter(attribute=\"merge_commit\", value=false) -%}
{% for group, commits in visible_commits | group_by(attribute=\"group\") -%}
### {{ group | striptags | trim }}
{% for commit in commits | unique(attribute=\"message\") -%}
- {% if commit.breaking %}**BREAKING:** {% endif %}{% if commit.scope %}[{{ commit.scope }}] {% endif %}{{ commit.message | split(pat=\"\\n\") | first | trim | upper_first }}
{% endfor -%}
{% if not loop.last %}

{% endif -%}
{% endfor -%}
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = true
split_commits = false
protect_breaking_commits = true
sort_commits = "oldest"

tag_pattern = "[0-9]{8}\\.[0-9]{2}"

commit_parsers = [
  { body = "(?i)security", group = "<!-- 5 -->Security" },
  { message = "(?i)^merge", skip = true },
  { message = "^build\\(deps", skip = true },
  { message = "^build\\(deps-dev", skip = true },
  { message = "^build\\([^)]+\\)?:", skip = true },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\([^)]+\\)?:", skip = true },
  { message = "^ci\\([^)]+\\)?:", skip = true },
  { message = "^docs\\([^)]+\\)?:", skip = true },
  { message = "^style\\([^)]+\\)?:", skip = true },
  { message = "^test\\([^)]+\\)?:", skip = true },
  { message = "^feat(\\([^)]+\\))?!?:", group = "<!-- 0 -->Added" },
  { message = "(?i)^(add|implement|introduce|create|productize|ship|complete)\\b", group = "<!-- 0 -->Added" },
  { message = "^perf(\\([^)]+\\))?!?:", group = "<!-- 1 -->Changed" },
  { message = "^refactor(\\([^)]+\\))?!?:", group = "<!-- 1 -->Changed" },
  { message = "^revert(\\([^)]+\\))?!?:", group = "<!-- 1 -->Changed" },
  { message = "(?i)^(improve|refine|polish|update|align|keep|move|use|wire|route|show|track|preserve|separate|share|scope|switch|rewrite|lower|animate|bundle|group|support|persist|flush|stop|deepen|parse|clean up|refactor)\\b", group = "<!-- 1 -->Changed" },
  { message = "(?i)^.*deprecat.*$", group = "<!-- 2 -->Deprecated" },
  { message = "(?i)^.*(remove|delete|drop).*$", group = "<!-- 3 -->Removed" },
  { message = "^fix(\\([^)]+\\))?!?:", group = "<!-- 4 -->Fixed" },
  { message = "(?i)^(fix|handle|resolve|prevent|avoid|ignore|backfill|prune|clear|restore|harden)\\b", group = "<!-- 4 -->Fixed" },
  { message = "(?i)^.*security.*$", group = "<!-- 5 -->Security" },
  { message = ".*", group = "<!-- 1 -->Changed" },
]
